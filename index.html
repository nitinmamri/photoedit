<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>👮‍♀️ A4 Photo Layout Live Editor</title>
  <style>
    :root{
      --bg:#f4f7fb;
      --card:#ffffff;
      --text:#1e293b;
      --muted:#64748b;
      --primary:#2563eb;
      --primary-2:#1d4ed8;
      --accent:#0ea5e9;
      --border:#d9e4f2;
      --shadow:0 18px 45px rgba(15,23,42,.10);
      --radius:22px;
      --sidebar-w:370px;
      --sidebar-collapsed-w:64px;
      --pageShift:0px;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family: Inter, Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, #130277 0%, transparent 30%),
        linear-gradient(180deg,#612570 0%, #9fc9f8 100%);
      color:var(--text);
      padding:20px;
      overflow-x:hidden;
    }

    .app{
      max-width: 1360px;
      margin: 0 auto;
      display:flex;
      gap:22px;
      align-items:flex-start;
    }

    .panel{
      width:var(--sidebar-w);
      background:linear-gradient(180deg,#ffffff 0%, #fbfdff 100%);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
      transition: width .25s ease;
      position:sticky;
      top:20px;
      max-height: calc(100vh - 40px);
      flex:0 0 auto;
    }

    .panel.collapsed{ width:var(--sidebar-collapsed-w); }

    .panel .header{
      padding:16px 18px;
      background:#000000;
      color:#fff;
      font-weight:700;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      letter-spacing:.2px;
    }

    .toggle-btn{
      border:none;
      background:rgba(255,255,255,.16);
      color:#fff;
      width:36px;
      height:36px;
      border-radius:12px;
      cursor:pointer;
      font-size:18px;
      font-weight:700;
      transition:.2s ease;
    }

    .toggle-btn:hover{ background:rgba(255,255,255,.24); }

    .panel-body{
      padding:16px;
      overflow-y:auto;
      max-height: calc(100vh - 92px);
      background-color: #0ea5e9;
    }

    .panel.collapsed .panel-body{ display:none; }

    .field{ margin-bottom:14px; }

    .field label{
      display:block;
      font-weight:700;
      font-size:14px;
      margin-bottom:8px;
      color:#0f172a;
    }

    input[type="file"]{
      width:100%;
      padding:12px;
      border:1px dashed #b9c7da;
      border-radius:14px;
      background:#f8fbff;
      cursor:pointer;
    }

    .size-grid{
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap:8px;
    }

    .size-btn{
      display:flex;
      align-items:center;
      justify-content:center;
      padding:10px 8px;
      border:2px solid #f20000;
      border-radius:14px;
      background:#f8fafc;
      cursor:pointer;
      font-size:14px;
      user-select:none;
      transition:.2s ease;
    }

    .size-btn:hover{ transform: translateY(-1px); }
    .size-btn input{display:none;}
    .size-btn.active{
      background:linear-gradient(135deg,#dbeafe,#eff6ff);
      border-color:#93c5fd;
      color:#1d4ed8;
      font-weight:700;
      box-shadow:0 8px 18px rgba(37,99,235,.10);
    }

    .sliders{ display:grid; gap:12px; }

    .slider{
      background:#000000;
      border:1px solid var(--border);
      border-radius:16px;
      padding:10px 12px;
    }

    .slider-top{
      display:flex;
      justify-content:space-between;
      gap:10px;
      margin-bottom:8px;
      font-size:14px;
    }

    .slider-top strong{ font-weight:700; color:#ffffff; }
    .slider-top span{ color:#ffffff; font-size:13px; }

    input[type="range"]{
      width:100%;
      accent-color:var(--primary);
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .btn{
      border:none;
      border-radius:14px;
      padding:12px 16px;
      cursor:pointer;
      font-weight:700;
      font-size:14px;
      transition:.2s ease;
    }

    .btn:hover{ transform: translateY(-1px); }
    .btn-primary{
      background:linear-gradient(135deg,var(--primary-2),var(--primary));
      color:#fff;
    }
    .btn-light{
      background:#e5e7eb;
      color:#111827;
    }

    .preview{
      flex:1;
      background:linear-gradient(180deg,#ffffff 0%, #fbfdff 100%);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
      min-width:0;
    }

    .preview-head{
      padding:16px 18px;
      background:linear-gradient(135deg,#0f172a,#1e293b);
      color:#fff;
      font-weight:700;
      letter-spacing:.2px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .preview-page{
      width:210mm;
      min-height:297mm;
      margin:18px auto 18px auto;
      background:#fff;
      padding:4mm 8mm 0 8mm;
      border:1px solid #edf2f7;
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 10px 24px rgba(15,23,42,.06);
    }

    .grid-wrap{
      width:100%;
      display:flex;
      justify-content:center;
      align-items:flex-start;
      transform: translateY(var(--pageShift));
    }

    .grid{
      display:grid;
      gap:8px;
      justify-content:center;
      align-content:start;
      justify-items:center;
      margin:0 auto;
      padding-top:0;
    }

    .grid-3,.grid-6,.grid-9,.grid-12{
      grid-template-columns: repeat(3, 1.2in);
    }

    .photo{
      width:1.2in;
      height:1.4in;
      border:1px solid #111;
      background:#f3f4f6;
      overflow:hidden;
      position:relative;
      border-radius:6px;
    }

    .photo img{
      width:100%;
      height:100%;
      display:block;
      object-fit:cover;
      transform: translate(var(--tx, 0%), var(--ty, 0%)) scale(var(--zoom, 1)) rotate(var(--rot, 0deg));
      filter: brightness(var(--br, 100%)) contrast(var(--ct, 100%)) saturate(var(--sa, 100%)) blur(var(--bl, 0px)) grayscale(var(--gs, 0%));
      transform-origin:center center;
    }

    .placeholder{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#94a3b8;
      font-size:12px;
      padding:10px;
      text-align:center;
      line-height:1.4;
    }

    @media print{
      @page{ size:A4; margin:0; }
      html,body{ width:210mm; height:297mm; margin:0; padding:0; background:#fff; }
      .panel,.preview-head{ display:none !important; }
      .app{ display:block; max-width:none; }
      .preview{ border:none; box-shadow:none; }
      .preview-page{
        width:210mm;
        min-height:297mm;
        margin:0;
        border:none;
        border-radius:0;
        padding:4mm 0 0 0;
        overflow:hidden;
        box-shadow:none;
      }
      .grid-wrap{
        transform: translateY(var(--pageShift));
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="panel" id="leftPanel">
      <div class="header">
        <span id="panelTitle">A4 Photo Layout Live Editor</span>
        <button class="toggle-btn" id="togglePanel">☰</button>
      </div>
      <div class="panel-body">
        <div class="field">
          <label for="singlePhoto">Photo Upload</label>
          <input type="file" id="singlePhoto" accept="image/*">
        </div>

        <div class="field">
          <label>Layout</label>
          <div class="size-grid">
            <label class="size-btn active"><input type="radio" name="photoOption" value="3" checked>3</label>
            <label class="size-btn"><input type="radio" name="photoOption" value="6">6</label>
            <label class="size-btn"><input type="radio" name="photoOption" value="9">9</label>
            <label class="size-btn"><input type="radio" name="photoOption" value="12">12</label>
          </div>
        </div>

        <div class="sliders">
          <div class="slider"><div class="slider-top"><strong>Brightness</strong><span id="v-br">100%</span></div><input type="range" id="brightness" min="0" max="200" value="100"></div>
          <div class="slider"><div class="slider-top"><strong>Contrast</strong><span id="v-ct">100%</span></div><input type="range" id="contrast" min="0" max="200" value="100"></div>
          <div class="slider"><div class="slider-top"><strong>Saturation</strong><span id="v-sa">100%</span></div><input type="range" id="saturation" min="0" max="200" value="100"></div>
          <div class="slider"><div class="slider-top"><strong>Blur</strong><span id="v-bl">0px</span></div><input type="range" id="blur" min="0" max="6" value="0" step="0.1"></div>
          <div class="slider"><div class="slider-top"><strong>Grayscale</strong><span id="v-gs">0%</span></div><input type="range" id="grayscale" min="0" max="100" value="0"></div>
          <div class="slider"><div class="slider-top"><strong>Rotate</strong><span id="v-rot">0deg</span></div><input type="range" id="rotate" min="-45" max="45" value="0"></div>
          <div class="slider"><div class="slider-top"><strong>Zoom</strong><span id="v-zoom">100%</span></div><input type="range" id="zoom" min="80" max="150" value="100"></div>
          <div class="slider"><div class="slider-top"><strong>Move X</strong><span id="v-tx">0%</span></div><input type="range" id="moveX" min="-30" max="30" value="0"></div>
          <div class="slider"><div class="slider-top"><strong>Move Y</strong><span id="v-ty">0%</span></div><input type="range" id="moveY" min="-30" max="30" value="0"></div>
          <div class="slider"><div class="slider-top"><strong>Page Shift</strong><span id="v-page">0px</span></div><input type="range" id="pageShift" min="-80" max="80" value="0"></div>
        </div>

        <div class="actions">
          <button class="btn btn-primary" onclick="window.print()">Print / Save PDF</button>
          <button class="btn btn-light" onclick="resetAdjustments()">Reset</button>
        </div>
      </div>
    </div>

    <div class="preview">
      <div class="preview-head">
        <span>Preview</span>
        <span>NITIN VERMA</span>
      </div>
      <div class="preview-page">
        <div class="grid-wrap" id="gridWrap">
          <div class="grid grid-3" id="photoGrid">
            <div class="photo"><div class="placeholder">Upload photo</div></div>
            <div class="photo"><div class="placeholder">Upload photo</div></div>
            <div class="photo"><div class="placeholder">Upload photo</div></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentPhotoData = null;

    const fileInput = document.getElementById('singlePhoto');
    const grid = document.getElementById('photoGrid');
    const optionInputs = [...document.querySelectorAll('input[name="photoOption"]')];
    const sizeBtns = [...document.querySelectorAll('.size-btn')];
    const panel = document.getElementById('leftPanel');
    const togglePanel = document.getElementById('togglePanel');
    const panelTitle = document.getElementById('panelTitle');

    const sliders = {
      brightness: document.getElementById('brightness'),
      contrast: document.getElementById('contrast'),
      saturation: document.getElementById('saturation'),
      blur: document.getElementById('blur'),
      grayscale: document.getElementById('grayscale'),
      rotate: document.getElementById('rotate'),
      zoom: document.getElementById('zoom'),
      moveX: document.getElementById('moveX'),
      moveY: document.getElementById('moveY'),
      pageShift: document.getElementById('pageShift')
    };

    function updateLabels() {
      document.getElementById('v-br').textContent = sliders.brightness.value + '%';
      document.getElementById('v-ct').textContent = sliders.contrast.value + '%';
      document.getElementById('v-sa').textContent = sliders.saturation.value + '%';
      document.getElementById('v-bl').textContent = sliders.blur.value + 'px';
      document.getElementById('v-gs').textContent = sliders.grayscale.value + '%';
      document.getElementById('v-rot').textContent = sliders.rotate.value + 'deg';
      document.getElementById('v-zoom').textContent = sliders.zoom.value + '%';
      document.getElementById('v-tx').textContent = sliders.moveX.value + '%';
      document.getElementById('v-ty').textContent = sliders.moveY.value + '%';
      document.getElementById('v-page').textContent = sliders.pageShift.value + 'px';
    }

    function applyEffects() {
      const imgs = document.querySelectorAll('.photo img');
      imgs.forEach(img => {
        img.style.setProperty('--br', sliders.brightness.value + '%');
        img.style.setProperty('--ct', sliders.contrast.value + '%');
        img.style.setProperty('--sa', sliders.saturation.value + '%');
        img.style.setProperty('--bl', sliders.blur.value + 'px');
        img.style.setProperty('--gs', sliders.grayscale.value + '%');
        img.style.setProperty('--rot', sliders.rotate.value + 'deg');
        img.style.setProperty('--zoom', (sliders.zoom.value / 100));
        img.style.setProperty('--tx', sliders.moveX.value + '%');
        img.style.setProperty('--ty', sliders.moveY.value + '%');
      });
      document.documentElement.style.setProperty('--pageShift', sliders.pageShift.value + 'px');
    }

    function getCount() {
      return Number(document.querySelector('input[name="photoOption"]:checked').value);
    }

    function setActiveSize(val) {
      sizeBtns.forEach(btn => btn.classList.remove('active'));
      const active = sizeBtns.find(btn => btn.querySelector('input').value === String(val));
      if (active) active.classList.add('active');
    }

    function renderGrid(count) {
      grid.innerHTML = '';
      grid.className = 'grid grid-' + count;
      for (let i = 0; i < count; i++) {
        const box = document.createElement('div');
        box.className = 'photo';
        box.innerHTML = currentPhotoData
          ? `<img src="${currentPhotoData}" alt="Photo">`
          : `<div class="placeholder">Upload photo</div>`;
        grid.appendChild(box);
      }
      applyEffects();
    }

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        currentPhotoData = ev.target.result;
        renderGrid(getCount());
      };
      reader.readAsDataURL(file);
    });

    optionInputs.forEach(input => {
      input.addEventListener('change', () => {
        const count = Number(input.value);
        setActiveSize(count);
        renderGrid(count);
      });
    });

    Object.values(sliders).forEach(slider => {
      slider.addEventListener('input', () => {
        updateLabels();
        applyEffects();
      });
    });

    function resetAdjustments() {
      sliders.brightness.value = 100;
      sliders.contrast.value = 100;
      sliders.saturation.value = 100;
      sliders.blur.value = 0;
      sliders.grayscale.value = 0;
      sliders.rotate.value = 0;
      sliders.zoom.value = 100;
      sliders.moveX.value = 0;
      sliders.moveY.value = 0;
      sliders.pageShift.value = 0;
      updateLabels();
      applyEffects();
    }

    togglePanel.addEventListener('click', () => {
      panel.classList.toggle('collapsed');
      togglePanel.textContent = panel.classList.contains('collapsed') ? '☰' : '×';
      panelTitle.style.display = panel.classList.contains('collapsed') ? 'none' : 'inline';
    });

    updateLabels();
    renderGrid(3);
  </script>
</body>
</html>
